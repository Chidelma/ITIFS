name: CI

on:
  push:
    branches: [main, master, staging, release/*]
  pull_request:
    branches: [main, master, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petstore-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - shell: bash
        run: chmod +x mvnw

      - run: ./mvnw -B test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petstore-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: petstore-client/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build --if-present
